{% extends 'base_templates/base.html' %}

{% block content %}
<h2>Установите новый пароль</h2>
<form method="post">
    {% csrf_token %}
    {{ form.new_password1.errors }}
    <label for="id_new_password1">Новый пароль:</label><br/>
    {{ form.new_password1 }}<br/><br/>

    {{ form.new_password2.errors }}
    <label for="id_new_password2">Подтверждение пароля:</label><br/>
    {{ form.new_password2 }}<br/><br/>

    <input type="submit" value="Сохранить"/>
</form>
{% endblock %}
